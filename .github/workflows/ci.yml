name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older runs of the same branch when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck · Lint · Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # `npm ci` triggers our postinstall script which runs `prisma generate`,
        # so the generated client is in place before tsc/eslint run.
        run: npm ci

      - name: TypeScript
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint .

      - name: Vitest
        run: npm test
